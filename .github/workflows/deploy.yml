name: deploy.yml
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/internship-assignment:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/internship-assignment

      - name: Deploy to ec2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/internship-assignment:latest

            docker rm -f internship-api || true

            docker run -d \
              --name internship-api \
              --restart unless-stopped \
              -p 80:9000 \
              ${{ secrets.DOCKER_USERNAME }}/internship-assignment:latest
          
  
          
